<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>SSQE - Gestão SIP | MAGIUS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
    body { display:flex; background:#f5f7fa; height:100vh; }
    .sidebar { width:240px; background:#111827; color:white; padding:20px; }
    .sidebar h2 { margin-bottom:30px; font-size:18px; font-weight:600; }
    .sidebar ul { list-style:none; }
    .sidebar li { padding:12px 0; cursor:pointer; opacity:.85; }
    .sidebar li.active, .sidebar li:hover { opacity:1; font-weight:600; }
    .main { flex:1; padding:30px; overflow:auto; }
    .page { display:none; }
    .page.active { display:block; }
    .card { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.05); }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:8px; border-bottom:1px solid #eee; font-size:13px; }
    .status-delayed { background:#fee2e2; color:#b91c1c; font-weight:600; }
    .status-complete { background:#dcfce7; color:#166534; font-weight:600; }
    .status-on_going { background:#fef9c3; color:#854d0e; font-weight:600; }
    #gantt { background:white; padding:20px; border-radius:12px; min-height:400px; }

    /* ===== GANTT CUSTOM COLORS ===== */
    .gantt .bar-group { fill:#1e3a8a !important; }
    .gantt .bar-action { fill:#2563eb !important; }
    .gantt .bar-delayed { fill:#dc2626 !important; }
    .gantt .bar-complete { fill:#16a34a !important; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>SIP Governance</h2>
  <ul>
    <li data-page="dashboard" class="active">Dashboard</li>
    <li data-page="projects">Projetos</li>
    <li data-page="ganttPage">Gantt</li>
  </ul>
</div>

<div class="main">

  <div id="dashboard" class="page active">
    <div class="card">Dashboard operacional</div>
  </div>

  <div id="projects" class="page">
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Ação</th>
            <th>Status</th>
            <th>Início</th>
            <th>Prazo</th>
            <th>Atraso (dias)</th>
          </tr>
        </thead>
        <tbody id="projectsTable"></tbody>
      </table>
    </div>
  </div>

  <div id="ganttPage" class="page">
    <div id="gantt"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function() {

  const allActions = [
    {id:1, group:"PFMEA e Plano de Controle", status:"delayed", start:"2025-06-11", end:"2025-07-04"},
    {id:2, group:"PFMEA e Plano de Controle", status:"complete", start:"2025-06-30", end:"2025-07-01"},
    {id:3, group:"PFMEA e Plano de Controle", status:"delayed", start:"2025-07-01", end:"2025-09-30"},
    {id:4, group:"PFMEA e Plano de Controle", status:"on_going", start:"2025-06-30", end:"2025-07-11"},
    {id:5, group:"PFMEA e Plano de Controle", status:"on_going", start:"2025-07-01", end:"2025-07-11"},
    {id:6, group:"PFMEA e Plano de Controle", status:"on_going", start:"2025-06-25", end:"2025-07-30"},
    {id:7, group:"PFMEA e Plano de Controle", status:"on_going", start:"2025-06-30", end:"2025-12-19"},

    {id:8, group:"Plano de Controle e Setup", status:"complete", start:"2025-06-16", end:"2026-02-27"},
    {id:9, group:"Plano de Controle e Setup", status:"complete", start:"2025-06-11", end:"2025-06-26"},
    {id:10, group:"Plano de Controle e Setup", status:"delayed", start:"2025-07-01", end:"2025-07-04"},
    {id:11, group:"Plano de Controle e Setup", status:"complete", start:"2025-07-01", end:"2025-07-01"},
    {id:12, group:"Plano de Controle e Setup", status:"on_going", start:"2025-07-01", end:"2025-07-11"},
    {id:13, group:"Plano de Controle e Setup", status:"on_going", start:"2025-07-01", end:"2025-11-28"},
    {id:14, group:"Plano de Controle e Setup", status:"on_going", start:"2025-07-01", end:"2025-08-28"},

    {id:15, group:"Inspeção Volante da Qualidade", status:"on_going", start:"2025-06-25", end:"2025-11-28"},
    {id:16, group:"Inspeção Volante da Qualidade", status:"on_going", start:"2025-06-25", end:"2025-12-06"},
    {id:17, group:"Inspeção Volante da Qualidade", status:"on_going", start:"2025-06-25", end:"2025-08-29"},

    {id:19, group:"Gestão de Calibrações", status:"on_going", start:"2025-03-17", end:"2025-09-30"},
    {id:20, group:"Gestão de Calibrações", status:"on_going", start:"2025-03-17", end:"2025-09-30"},

    {id:21, group:"Fluxo de Processo", status:"on_going", start:"2025-06-11", end:"2025-07-18"},

    {id:22, group:"Embalamento", status:"on_going", start:"2025-07-04", end:"2025-08-29"},

    {id:23, group:"Dispositivos de Medição", status:"on_going", start:"2025-06-16", end:"2025-09-16"},
    {id:24, group:"Dispositivos de Medição", status:"complete", start:"2025-06-16", end:"2025-06-27"},
    {id:25, group:"Dispositivos de Medição", status:"complete", start:"2025-06-23", end:"2025-07-04"},
    {id:26, group:"Dispositivos de Medição", status:"on_going", start:"2025-07-01", end:"2025-07-11"},

    {id:27, group:"CARs John Deere", status:"complete", start:"2025-04-24", end:"2025-07-07"},

    {id:28, group:"Analise de Causa Raiz", status:"complete", start:"2025-03-17", end:"2025-08-30"},
    {id:29, group:"Analise de Causa Raiz", status:"complete", start:"2025-03-17", end:"2025-08-30"},

    {id:30, group:"Melhoria Continua", status:"on_going", start:"2025-07-04", end:"2026-02-20"}
  ];

  let expandedGroup = null;

  function calculateDelay(end, status){
    if(status === "complete") return 0;
    const today = new Date();
    const due = new Date(end);
    const diff = Math.floor((today - due)/(1000*60*60*24));
    return diff > 0 ? diff : 0;
  }

  function renderTable(){
    const table = document.getElementById("projectsTable");
    table.innerHTML = "";

    allActions.forEach(a => {
      const delay = calculateDelay(a.end, a.status);
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${a.group} #${a.id}</td>
        <td class="status-${a.status}">${a.status}</td>
        <td>${a.start}</td>
        <td>${a.end}</td>
        <td>${delay || '-'}</td>
      `;
      table.appendChild(row);
    });
  }

  function renderGantt(){
    const container = document.getElementById("gantt");
    container.innerHTML = "";

    if(typeof Gantt === "undefined"){
      console.error("Frappe Gantt não carregado.");
      return;
    }

    const groups = {};
    allActions.forEach(a => {
      if(!groups[a.group]) groups[a.group] = [];
      groups[a.group].push(a);
    });

    const tasks = [];
    const groupIdMap = {}; // controla id seguro -> nome real
    let groupIndex = 0;

    Object.keys(groups).forEach(groupName => {
      const items = groups[groupName];

      const minStart = items.reduce((min,i)=> i.start < min ? i.start : min, items[0].start);
      const maxEnd = items.reduce((max,i)=> i.end > max ? i.end : max, items[0].end);

      // ID segur
  }

  document.querySelectorAll(".sidebar li").forEach(item => {
    item.addEventListener("click", () => {
      document.querySelectorAll(".sidebar li").forEach(i=>i.classList.remove("active"));
      document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

      item.classList.add("active");
      const pageId = item.dataset.page;
      document.getElementById(pageId).classList.add("active");

      if(pageId === "ganttPage"){
        setTimeout(renderGantt, 100);
      }
    });
  });

  renderTable();

});

</script>

</body>
</html>
